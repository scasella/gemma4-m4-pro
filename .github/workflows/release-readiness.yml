name: Release Readiness

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  release-readiness:
    runs-on: macos-latest

    defaults:
      run:
        working-directory: autoresearch

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync autoresearch environment
        run: uv sync

      - name: Run release readiness preflight
        env:
          SKIP_STREAMING_REGRESSION_SMOKE: "1"
        run: python3 release_readiness_check.py

      - name: Run lean public repo audit
        run: python3 ../lean_repo_audit.py

      - name: Rehearse full publish flow
        run: ../rehearse_publish_flow.sh
